<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>כפר המשנה — מצב קומיקס</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/comics.css" />
  <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>
<body>
  <header class="topbar">
    <h1>📚 מצב קומיקס</h1>
    <div class="controls">
      <a href="/" class="button secondary" title="חזרה למצב סטודיו">🎬 מצב סטודיו</a>
      <button id="newComicBtn" class="primary">קומיקס חדש</button>
      <select id="comicSelect" title="בחר קומיקס"></select>
      <button id="editComicBtn" class="secondary">ערוך תיאור / סגנון</button>
      <button id="showPromptBtn" class="secondary">צפה בפרומפט (Claude)</button>
      <div class="flow-controls">
        <button id="proposeBtn" class="primary">פרק לפאנלים (Claude)</button>
        <button id="generateAllBtn">צור תמונות</button>
        <select id="workMode" title="מצב עבודה">
          <option value="auto">אוטומטי מלא</option>
          <option value="semi" selected>חצי-אוטומטי</option>
          <option value="manual">ידני</option>
        </select>
      </div>
      <div class="view-toggle">
        <button id="viewEditBtn" class="primary" title="עריכת פאנלים">✏️ עריכה</button>
        <button id="viewLayoutBtn" class="secondary" title="עיצוב עמוד והורדה">📄 עיצוב עמוד</button>
      </div>
    </div>
  </header>

  <div id="status" class="status"></div>

  <div class="layout">
    <aside class="assets-sidebar">
      <h3>דמויות ורפרנסים</h3>
      <div id="globalRefsList" class="refs-list"></div>
    </aside>

    <div class="main-content">
      <div id="editArea" class="edit-area">
        <main id="panels" class="panels-grid"></main>

        <aside id="previewSidebar" class="preview-sidebar">
          <div class="preview-head">
            <span>👁️ תצוגה מקדימה של העמוד</span>
            <button id="togglePreviewBtn" class="small-btn" title="הסתר/הצג">⟩</button>
          </div>
          <div id="previewPages" class="preview-pages preview-scaled"></div>
        </aside>
        <button id="showPreviewBtn" class="small-btn preview-reopen hidden" title="הצג תצוגה מקדימה">👁️</button>
      </div>

      <section id="pagesView" class="pages-view hidden">
        <div class="pages-toolbar">
          <button id="downloadPdfBtn" class="accent">⬇️ הורד PDF</button>
          <button id="downloadPngBtn" class="accent">⬇️ הורד PNG (לעמוד)</button>
          <span id="exportStatus" class="export-status"></span>
        </div>
        <div id="pagesContainer" class="pages-container"></div>
      </section>
    </div>
  </div>

  <!-- מודאל קומיקס חדש -->
  <div id="newComicModal" class="modal hidden">
    <div class="modal-box large">
      <h3>יצירת קומיקס חדש</h3>
      <label>מזהה (אנגלית ללא רווחים): <input type="text" id="ncId"></label>
      <label>כותרת: <input type="text" id="ncTitle"></label>
      <label>תיאור הקומיקס (מפורט ככל האפשר):
        <textarea id="ncDesc" rows="8" placeholder="תאר את העלילה, הדמויות, המקומות והרגעים המרכזיים..."></textarea>
      </label>
      <label>מספר פאנלים משוער: <input type="number" id="ncPanels" value="6" min="1" max="60"></label>
      <div class="modal-actions">
        <button id="ncSave" class="primary">צור</button>
        <button id="ncCancel">ביטול</button>
      </div>
    </div>
  </div>

  <!-- מודאל עריכת תיאור/סגנון -->
  <div id="editComicModal" class="modal hidden">
    <div class="modal-box large">
      <h3>עריכת קומיקס</h3>
      <label>תיאור הקומיקס:
        <textarea id="ecDesc" rows="8"></textarea>
      </label>
      <label>הוראות במאי:
        <textarea id="ecDirector" rows="3" placeholder="הנחיות מיוחדות ל-Claude..."></textarea>
      </label>
      <label>תיאור סגנון ויזואלי:
        <textarea id="ecStyle" rows="4"></textarea>
      </label>
      <label>מספר פאנלים משוער: <input type="number" id="ecPanels" min="1" max="60"></label>
      <div class="modal-actions">
        <button id="ecSave" class="primary">שמור</button>
        <button id="ecCancel">ביטול</button>
      </div>
    </div>
  </div>

  <!-- מודאל הצגת פרומפט -->
  <div id="showPromptModal" class="modal hidden">
    <div class="modal-box large">
      <h3>הפרומפט שיישלח ל-Claude</h3>
      <textarea id="previewPromptText" rows="15" style="width: 100%; font-family: monospace; font-size: 12px; direction: ltr;"></textarea>
      <div class="modal-actions" style="margin-top: 15px;">
        <button id="savePromptBtn" class="primary">הרץ עם פרומפט זה</button>
        <button id="closePromptBtn">סגור</button>
      </div>
    </div>
  </div>

  <!-- בורר רפרנסים -->
  <div id="refModal" class="modal hidden">
    <div class="modal-box">
      <h3>בחר רפרנסים לפאנל</h3>
      <div id="refGrid" class="ref-grid"></div>
      <div class="modal-actions">
        <button id="refSave" class="primary">שמור</button>
        <button id="refCancel">ביטול</button>
      </div>
    </div>
  </div>

  <!-- תבנית פאנל -->
  <template id="panelTemplate">
    <article class="panel-card">
      <div class="panel-header">
        <span class="panel-number"></span>
        <span class="panel-location"></span>
        <span class="scene-status-badge"></span>
      </div>

      <div class="panel-image-preview">
        <div class="panel-clip">
          <img class="panel-image" alt="" />
          <div class="no-image-placeholder"><span>🖼️</span></div>
        </div>
        <div class="panel-bubbles"></div>
      </div>
      <div class="image-controls">
        <button class="generate-btn" title="צור תמונה">🎨 צור</button>
        <button class="approve-btn" title="אשר">✓ אשר</button>
      </div>

      <div class="scene-section">
        <label class="section-label">תיאור הפאנל</label>
        <input class="panel-desc" type="text" placeholder="מה קורה בפאנל..." />
      </div>
      <div class="scene-section">
        <label class="section-label">📍 מיקום</label>
        <input class="location-text" type="text" placeholder="מקום..." />
      </div>
      <div class="panel-layout-row">
        <div class="scene-section">
          <label class="section-label">📐 גודל</label>
          <select class="panel-size">
            <option value="third">שליש (צר)</option>
            <option value="half">חצי</option>
            <option value="two_thirds">שני-שליש</option>
            <option value="full">רוחב מלא</option>
            <option value="tall">צר וגבוה</option>
            <option value="big">גדול</option>
            <option value="splash">עמוד שלם</option>
          </select>
        </div>
        <div class="scene-section">
          <label class="section-label">🔷 צורה</label>
          <select class="panel-shape">
            <option value="rect">מלבן (רגיל)</option>
            <option value="rounded">פינות מעוגלות</option>
            <option value="circle">עיגול</option>
            <option value="ellipse">אליפסה</option>
            <option value="triangle">משולש</option>
            <option value="diamond">מעוין</option>
            <option value="hexagon">משושה</option>
            <option value="octagon">מתומן</option>
            <option value="parallelogram">מקבילית / אלכסון</option>
            <option value="chevron">חץ</option>
            <option value="star">כוכב</option>
            <option value="burst">פיצוץ (burst)</option>
          </select>
        </div>
      </div>
      <div class="scene-section">
        <label class="section-label">Prompt לתמונה</label>
        <textarea class="prompt-text" rows="3" placeholder="פרומפט ויזואלי..."></textarea>
      </div>
      <div class="scene-section refs-section">
        <label class="section-label">רפרנסים</label>
        <div class="ref-chips-container"></div>
        <button class="edit-refs-btn" title="ערוך רפרנסים">+</button>
      </div>
      <div class="scene-section">
        <label class="section-label">💬 בועות דיבור</label>
        <div class="dialogue-list"></div>
        <button class="add-dialogue-btn secondary small-btn">+ הוסף בועה</button>
      </div>
      <div class="scene-section">
        <label class="section-label">📝 כיתוב קריינות</label>
        <input class="caption-text" type="text" placeholder="תיבת קריינות (אופציונלי)..." />
      </div>
      <div class="scene-controls">
        <button class="save-scene-btn primary small-btn" title="שמור">💾 שמור פאנל</button>
        <button class="delete-scene-btn danger small-btn" title="מחק">🗑️</button>
      </div>
    </article>
  </template>

  <script src="/comics.js"></script>
</body>
</html>
