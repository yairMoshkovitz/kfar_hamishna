<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כפר המשנה - משחק חדש</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        #game-container {
            width: 800px;
            height: 600px;
            background: #87CEEB;
            position: relative;
            border: 8px solid #8B4513;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
        }

        #interaction-prompt {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: #333;
            padding: 15px 30px;
            border-radius: 10px;
            border: 3px solid #FFD700;
            font-size: 20px;
            font-weight: bold;
            display: none;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }

        #controls-help {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 14px;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div id="ui-overlay">
            <div id="hud">
                <span>📍 כפר המשנה</span>
                <span>⭐ נקודות: <span id="score">0</span></span>
            </div>
            <div id="interaction-prompt">לחץ SPACE להיכנס</div>
            <div id="controls-help">חצים: תנועה | SPACE: אינטראקציה</div>
        </div>
        <div id="loading">טוען משחק...</div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const loading = document.getElementById('loading');
        const interactionPrompt = document.getElementById('interaction-prompt');
        const scoreDisplay = document.getElementById('score');

        // הגדרות משחק
        const TILE_SIZE = 32;
        const WORLD_WIDTH = 50;
        const WORLD_HEIGHT = 50;
        
        canvas.width = 800;
        canvas.height = 600;

        // משתני משחק
        let player = {
            x: 25,
            y: 25,
            direction: 'down',
            isMoving: false,
            frame: 0,
            speed: 0.15
        };

        let camera = {
            x: 0,
            y: 0
        };

        let score = 0;
        let keys = {};
        let nearBuilding = null;

        // מפת העולם - 0 = דשא, 1 = שביל, 2 = בית, 3 = עץ
        let worldMap = [];
        
        // בניינים אינטראקטיביים
        const buildings = [
            { x: 20, y: 15, width: 3, height: 3, name: 'בית המדרש', type: 'synagogue' },
            { x: 30, y: 20, width: 2, height: 2, name: 'בית משפחת כהן', type: 'house' },
            { x: 15, y: 30, width: 2, height: 2, name: 'השוק', type: 'market' },
            { x: 35, y: 28, width: 3, height: 3, name: 'באר המים', type: 'well' }
        ];

        // יצירת מפת העולם
        function generateWorld() {
            for (let y = 0; y < WORLD_HEIGHT; y++) {
                worldMap[y] = [];
                for (let x = 0; x < WORLD_WIDTH; x++) {
                    // דשא כברירת מחדל
                    worldMap[y][x] = 0;
                    
                    // שבילים
                    if (x === 25 || y === 25) {
                        worldMap[y][x] = 1;
                    }
                    
                    // עצים אקראיים
                    if (Math.random() < 0.05 && worldMap[y][x] === 0) {
                        worldMap[y][x] = 3;
                    }
                }
            }
            
            // הוספת בניינים למפה
            buildings.forEach(building => {
                for (let by = 0; by < building.height; by++) {
                    for (let bx = 0; bx < building.width; bx++) {
                        if (building.y + by < WORLD_HEIGHT && building.x + bx < WORLD_WIDTH) {
                            worldMap[building.y + by][building.x + bx] = 2;
                        }
                    }
                }
            });
        }

        // ציור טייל
        function drawTile(x, y, type) {
            const screenX = x * TILE_SIZE - camera.x;
            const screenY = y * TILE_SIZE - camera.y;
            
            switch(type) {
                case 0: // דשא
                    ctx.fillStyle = (x + y) % 2 === 0 ? '#7CB342' : '#8BC34A';
                    ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
                    break;
                case 1: // שביל
                    ctx.fillStyle = '#D7CCC8';
                    ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
                    ctx.fillStyle = '#BCAAA4';
                    ctx.fillRect(screenX + 4, screenY + 4, TILE_SIZE - 8, TILE_SIZE - 8);
                    break;
                case 2: // בניין
                    ctx.fillStyle = '#8D6E63';
                    ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
                    ctx.fillStyle = '#6D4C41';
                    ctx.fillRect(screenX + 2, screenY + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                    break;
                case 3: // עץ
                    ctx.fillStyle = '#7CB342';
                    ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
                    ctx.fillStyle = '#5D4037';
                    ctx.fillRect(screenX + 12, screenY + 16, 8, 16);
                    ctx.fillStyle = '#388E3C';
                    ctx.beginPath();
                    ctx.arc(screenX + 16, screenY + 12, 12, 0, Math.PI * 2);
                    ctx.fill();
                    break;
            }
        }

        // ציור השחקן
        function drawPlayer() {
            const screenX = canvas.width / 2 - TILE_SIZE / 2;
            const screenY = canvas.height / 2 - TILE_SIZE / 2;
            
            // גוף
            ctx.fillStyle = '#2196F3';
            ctx.fillRect(screenX + 8, screenY + 16, 16, 12);
            
            // ראש
            ctx.fillStyle = '#FFE0BD';
            ctx.beginPath();
            ctx.arc(screenX + 16, screenY + 12, 8, 0, Math.PI * 2);
            ctx.fill();
            
            // עיניים
            ctx.fillStyle = '#000';
            ctx.fillRect(screenX + 12, screenY + 10, 2, 2);
            ctx.fillRect(screenX + 18, screenY + 10, 2, 2);
            
            // רגליים
            ctx.fillStyle = '#1976D2';
            if (player.isMoving) {
                const offset = Math.floor(player.frame) % 2 === 0 ? 2 : -2;
                ctx.fillRect(screenX + 8, screenY + 28, 6, 4);
                ctx.fillRect(screenX + 18 + offset, screenY + 28, 6, 4);
            } else {
                ctx.fillRect(screenX + 8, screenY + 28, 6, 4);
                ctx.fillRect(screenX + 18, screenY + 28, 6, 4);
            }
        }

        // ציור שמות בניינים
        function drawBuildingLabels() {
            buildings.forEach(building => {
                const screenX = (building.x + building.width / 2) * TILE_SIZE - camera.x;
                const screenY = (building.y - 0.5) * TILE_SIZE - camera.y;
                
                if (screenX > -100 && screenX < canvas.width + 100 && 
                    screenY > -50 && screenY < canvas.height + 50) {
                    ctx.fillStyle = 'rgba(255,255,255,0.9)';
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 3;
                    ctx.font = 'bold 14px Arial';
                    ctx.textAlign = 'center';
                    ctx.strokeText(building.name, screenX, screenY);
                    ctx.fillText(building.name, screenX, screenY);
                }
            });
        }

        // עדכון מצלמה
        function updateCamera() {
            camera.x = player.x * TILE_SIZE - canvas.width / 2 + TILE_SIZE / 2;
            camera.y = player.y * TILE_SIZE - canvas.height / 2 + TILE_SIZE / 2;
            
            camera.x = Math.max(0, Math.min(camera.x, WORLD_WIDTH * TILE_SIZE - canvas.width));
            camera.y = Math.max(0, Math.min(camera.y, WORLD_HEIGHT * TILE_SIZE - canvas.height));
        }

        // בדיקת התנגשות
        function canMoveTo(x, y) {
            const tileX = Math.floor(x);
            const tileY = Math.floor(y);
            
            if (tileX < 0 || tileX >= WORLD_WIDTH || tileY < 0 || tileY >= WORLD_HEIGHT) {
                return false;
            }
            
            const tile = worldMap[tileY][tileX];
            return tile !== 2 && tile !== 3;
        }

        // בדיקת קרבה לבניין
        function checkNearBuilding() {
            nearBuilding = null;
            buildings.forEach(building => {
                const dx = player.x - (building.x + building.width / 2);
                const dy = player.y - (building.y + building.height / 2);
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < 3) {
                    nearBuilding = building;
                }
            });
            
            if (nearBuilding) {
                interactionPrompt.style.display = 'block';
                interactionPrompt.textContent = `לחץ SPACE להיכנס ל${nearBuilding.name}`;
            } else {
                interactionPrompt.style.display = 'none';
            }
        }

        // כניסה לבניין
        function enterBuilding() {
            if (nearBuilding) {
                alert(`נכנסת ל${nearBuilding.name}!\n(כאן יהיה המשחק/תוכן)`);
                score += 10;
                scoreDisplay.textContent = score;
            }
        }

        // עדכון משחק
        function update() {
            let moved = false;
            let newX = player.x;
            let newY = player.y;
            
            if (keys['ArrowUp']) {
                newY -= player.speed;
                player.direction = 'up';
                moved = true;
            }
            if (keys['ArrowDown']) {
                newY += player.speed;
                player.direction = 'down';
                moved = true;
            }
            if (keys['ArrowLeft']) {
                newX -= player.speed;
                player.direction = 'left';
                moved = true;
            }
            if (keys['ArrowRight']) {
                newX += player.speed;
                player.direction = 'right';
                moved = true;
            }
            
            if (moved) {
                if (canMoveTo(newX, player.y)) {
                    player.x = newX;
                }
                if (canMoveTo(player.x, newY)) {
                    player.y = newY;
                }
                player.isMoving = true;
                player.frame += 0.2;
            } else {
                player.isMoving = false;
                player.frame = 0;
            }
            
            updateCamera();
            checkNearBuilding();
        }

        // ציור המשחק
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // ציור העולם
            const startX = Math.floor(camera.x / TILE_SIZE);
            const startY = Math.floor(camera.y / TILE_SIZE);
            const endX = Math.min(startX + Math.ceil(canvas.width / TILE_SIZE) + 1, WORLD_WIDTH);
            const endY = Math.min(startY + Math.ceil(canvas.height / TILE_SIZE) + 1, WORLD_HEIGHT);
            
            for (let y = startY; y < endY; y++) {
                for (let x = startX; x < endX; x++) {
                    drawTile(x, y, worldMap[y][x]);
                }
            }
            
            drawPlayer();
            drawBuildingLabels();
        }

        // לולאת משחק
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // טיפול במקלדת
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ') {
                e.preventDefault();
                enterBuilding();
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // אתחול
        generateWorld();
        loading.style.display = 'none';
        gameLoop();
    </script>
</body>
</html>
